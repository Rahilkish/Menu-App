<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Decider</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <h1>🍽️ Meal Decider</h1>
        
        <div class="tabs">
            <button class="tab-btn active" id="btn-pantry" onclick="switchTab('pantry-tab')">My Pantry</button>
            <button class="tab-btn" id="btn-meals" onclick="switchTab('meals-tab')">Find Meals</button>
        </div>

        <div id="pantry-tab" class="tab-content active">
            <input type="text" id="search-bar" placeholder="Search ingredients..." onkeyup="filterIngredients()">
            <div id="ingredient-categories">
                </div>
        </div>

        <div id="meals-tab" class="tab-content" style="display: none;">
            <h2>Select Meals</h2>
            <div class="meal-toggles">
                <label><input type="checkbox" id="toggle-breakfast" checked> Breakfast</label>
                <label><input type="checkbox" id="toggle-lunch" checked> Lunch</label>
                <label><input type="checkbox" id="toggle-dinner" checked> Dinner</label>
            </div>

            <div class="actions">
                <button onclick="showOptions()">Show All Options</button>
                <button class="primary" onclick="decideForMe()">Decide For Me!</button>
            </div>

            <div id="results">
                <p>Select your meals and tap a button above!</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
