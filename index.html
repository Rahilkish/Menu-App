<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kitchen Decider</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#FF7E67">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Kitchen">
    <link rel="apple-touch-icon" href="logo.png">
</head>
<body>
    <header class="app-header">
        <h1>🍽️ What's Cooking?</h1>
    </header>

    <main class="app-content">
        <div id="pantry-tab" class="tab-content active">
            <div class="sticky-controls">
                <input type="text" id="search-bar" placeholder="Search kitchen..." onkeyup="filterIngredients()">
                <div class="view-toggle">
                    <button id="btn-view-list" class="view-btn" onclick="setView('list')" aria-label="List View">☰</button>
                    <button id="btn-view-image" class="view-btn active" onclick="setView('image')" aria-label="Image View">🖼️</button>
                </div>
            </div>
            
            <div id="ingredient-categories" class="view-image pb-safe">
                </div>
        </div>

        <div id="meals-tab" class="tab-content" style="display: none;">
            <div class="card">
                <h2>Plan Your Day</h2>
                <div class="meal-toggles">
                    <label class="toggle-pill"><input type="checkbox" id="toggle-breakfast" checked> Breakfast</label>
                    <label class="toggle-pill"><input type="checkbox" id="toggle-lunch" checked> Lunch</label>
                    <label class="toggle-pill"><input type="checkbox" id="toggle-dinner" checked> Dinner</label>
                </div>
            </div>

            <button class="btn-primary" onclick="decideForMe()">Decide For Me ✨</button>
            <button class="btn-secondary" onclick="showOptions()">See All Possible Dishes</button>

            <div id="results" class="results-card">
                <p class="empty-state">Tap 'Decide For Me' to get a fresh meal plan!</p>
            </div>
        </div>

        <div id="setup-tab" class="tab-content" style="display: none;">
            <div class="card">
                <h2>Add New Ingredient</h2>
                <p class="subtitle">Add items to your pantry list.</p>
                <input type="text" id="new-ing-name" placeholder="e.g., Capsicum" class="form-input">
                <select id="new-ing-category" class="form-input">
                    <option value="Vegetables (Sabzi)">Vegetables (Sabzi)</option>
                    <option value="Dairy, Oil & Protein">Dairy, Oil & Protein</option>
                    <option value="Lentils & Grains (Dal/Atta)">Lentils & Grains (Dal/Atta)</option>
                </select>
                <button class="btn-primary form-btn" onclick="addNewIngredient()">Add to Pantry</button>
            </div>

            <div class="card">
                <h2>Add Custom Recipe</h2>
                <p class="subtitle">Create a dish and select what it needs.</p>
                <input type="text" id="new-recipe-name" placeholder="e.g., Paneer Tikka" class="form-input">
                
                <p class="subtitle" style="margin-top: 15px; margin-bottom: 5px;">Meal Type:</p>
                <select id="new-recipe-type" class="form-input">
                    <option value="breakfast">Breakfast</option>
                    <option value="lunch">Lunch</option>
                    <option value="dinner">Dinner</option>
                </select>

                <p class="subtitle" style="margin-top: 15px; margin-bottom: 5px;">Required Ingredients:</p>
                <div id="setup-ingredient-list" class="setup-grid">
                    </div>

                <button class="btn-primary form-btn" onclick="addNewRecipe()" style="margin-top: 15px;">Save Recipe</button>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" id="btn-pantry" onclick="switchTab('pantry-tab')">
            <span class="nav-icon">🛒</span>
            <span class="nav-text">Pantry</span>
        </button>
        <button class="nav-item" id="btn-meals" onclick="switchTab('meals-tab')">
            <span class="nav-icon">🍲</span>
            <span class="nav-text">Meals</span>
        </button>
        <button class="nav-item" id="btn-setup" onclick="switchTab('setup-tab')">
            <span class="nav-icon">⚙️</span>
            <span class="nav-text">Setup</span>
        </button>
    </nav>

    <script src="app.js"></script>
    <script>
        // Registers the Service Worker for offline PWA installation
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
